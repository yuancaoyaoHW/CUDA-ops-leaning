meta:
  title: 大模型推理框架/加速 8 周计划
  primary_roles:
  - 腾讯混元-大模型推理加速工程师
  - 小红书-大模型推理框架研发
  - 美团-大模型推理
  focus_weights:
    kernel: 45
    framework: 30
    perf: 15
    quant: 7
    interview: 3
  jd_tags:
    kernel: CUDA/Triton/CUTLASS/算子实现
    framework: vLLM/SGLang/TensorRT-LLM/ONNX Runtime
    serving: KV cache、scheduler、batching、PD 分离、容错
    perf: benchmark、Nsight、吞吐/延迟、瓶颈分析
    quant: INT4/FP8/GPTQ/AWQ/压缩
    docs: 源码走读、系统图、README、技术文档
    interview: mock、系统设计、项目 STAR、岗位问答
  milestones:
  - day: 14
    text: 2 个推理相关算子有 tests + benchmark；至少 1 个有 profile
  - day: 28
    text: 能讲清 softmax/RMSNorm/GEMM/attention 的性能瓶颈；有 attention toy
  - day: 42
    text: 能讲清 vLLM/SGLang scheduler、Mooncake/RBG/external KV、LongCat/MoE/fusion、PD/EPD
      分离
  - day: 56
    text: README、benchmark 图、系统设计稿、腾讯/小红书/美团定制问答、coding drill、模型基础兜底齐全
